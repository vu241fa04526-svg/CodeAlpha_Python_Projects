<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Portfolio Tracker</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="main-container">

    <div class="card">

        <h1>📊 Portfolio Tracker</h1>

        <div class="summary">

            <h2>Total Investment</h2>

            <h3>${{ total }}</h3>

        </div>

        <table>

            <thead>

                <tr>
                    <th>Stock</th>
                    <th>Shares</th>
                    <th>Price</th>
                    <th>Investment</th>
                </tr>

            </thead>

            <tbody>

                {% for item in portfolio %}

                <tr>

                    <td>{{ item.stock }}</td>

                    <td>{{ item.quantity }}</td>

                    <td>${{ item.price }}</td>

                    <td>${{ item.value }}</td>

                </tr>

                {% endfor %}

            </tbody>

        </table>

        <div class="button-area">

            <a href="/">

                <button>

                    Calculate Again

                </button>

            </a>

        </div>

    </div>

</div>

</body>

</html>
